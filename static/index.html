<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Voice Companion</title><link rel="stylesheet" href="/styles.css"></head>
<body><main><header><p class="eyebrow">SELF-HOSTED VOICE COMPANION</p><h1 id="app-name">Voice Companion</h1><p id="status">Loading private configuration…</p></header><section id="transcript" aria-live="polite"><p class="empty">Your local conversation will appear here.</p></section><form id="chat-form"><label for="message">Message</label><textarea id="message" maxlength="12000" placeholder="Type a message…"></textarea><div class="controls"><button type="button" id="hold">Hold to talk</button><button type="submit">Send</button><button type="button" id="stop" disabled>Stop audio</button></div></form><p class="note">Microphone audio is sent only to your configured transcription service. Credentials remain on the server.</p></main><script src="/app.js"></script></body></html>
